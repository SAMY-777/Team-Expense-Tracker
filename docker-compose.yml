# =============================================================================
# docker-compose.yml
# Spins up all three pieces of the stack together: PostgreSQL, the Express
# API, and the React frontend (served by nginx). Run with:
#   docker compose up --build
# =============================================================================

services:
  # ---- PostgreSQL database -------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: team_expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Persist database files across container restarts.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Express API ----------------------------------------------------------
  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: team_expense_tracker
      PGUSER: postgres
      PGPASSWORD: postgres
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      NODE_ENV: production
    ports:
      - "5000:5000"
    # Runs the schema + seed scripts, then starts the server. Safe to
    # re-run on every container start since both SQL files are idempotent
    # (schema.sql drops/recreates tables, seed.sql truncates first).
    command: sh -c "node db/runSql.js schema.sql && node db/runSql.js seed.sql && node src/server.js"

  # ---- React frontend (built + served by nginx) ------------------------------
  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  pgdata:
